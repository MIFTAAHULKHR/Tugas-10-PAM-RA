properties
# Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M

# Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

# Android
android.nonTransitiveRClass=true
android.useAndroidX=true

# Multiplatform Fixes
# Mengabaikan target iOS saat build di Windows agar tidak error "Could not resolve io.mockk"
kotlin.native.ignoreDisabledTargets=true

# Menghindari error saat menggunakan Compose Multiplatform dengan Gradle versi terbaru
org.jetbrains.compose.experimental.jpro.enabled=false

# Mengizinkan penggunaan fitur incubating seperti Type-safe project accessors
org.gradle.unsafe.configuration-cache-problems=warn